services:
  ros2:
    image: ros2-pi:jazzy-desktop
    container_name: ros2
    network_mode: host
    privileged: true
    restart: unless-stopped

    environment:
      DISPLAY: ${DISPLAY:-:0}
      XAUTHORITY: /home/ubuntu/.Xauthority
      QT_X11_NO_MITSHM: "1"
      LIBGL_ALWAYS_SOFTWARE: "1"
      GALLIUM_DRIVER: llvmpipe
      GZ_RENDER_ENGINE: ogre
      IGN_RENDER_ENGINE: ogre

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${HOME}/.docker.xauth:/home/ubuntu/.Xauthority:ro
      - ${HOME}/ros2_ws:/home/ubuntu/ros2_ws
      - /dev:/dev

    devices:
      - /dev/dri:/dev/dri

    stdin_open: true
    tty: true
