services:
  ros2:
    image: ros2-pi:jazzy-desktop
    container_name: ros2
    network_mode: host
    privileged: true
    restart: unless-stopped

    environment:
      DISPLAY: ${DISPLAY:-:0}
      XAUTHORITY: /home/ubuntu/.Xauthority
      QT_X11_NO_MITSHM: "1"
      LIBGL_ALWAYS_SOFTWARE: "1"
      GALLIUM_DRIVER: llvmpipe
      MESA_GL_VERSION_OVERRIDE: "3.3"
      GZ_RENDER_ENGINE: ogre
      IGN_RENDER_ENGINE: ogre

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/home/ubuntu/.Xauthority:ro
      - ${HOME}/ros2_ws:/home/ubuntu/ros2_ws
      - /dev:/dev
      - /sys/class/pwm:/sys/class/pwm
      - /sys/devices:/sys/devices
      
    devices:
      - /dev/gpiochip0
      - "/dev/i2c-1:/dev/i2c-1"
      - "/dev/i2c-4:/dev/i2c-4"
      # - "/dev/video0:/dev/video0" (for kameraet fra forrige feil)
    group_add:
      - dialout
      - i2c
      - video
      - "988"

    stdin_open: true
    tty: true
