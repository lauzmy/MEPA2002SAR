# ros_gz_bridge config for 3D mapping in simulation.
# World: test_world  |  Model: gregor

# Sim clock → ROS (required for use_sim_time)
- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

# Teleop / Nav2 → Gazebo MecanumDrive
- ros_topic_name: "/cmd_vel"
  gz_topic_name: "/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

# lidar3d tilt command → Gazebo JointPositionController
- ros_topic_name: "/lidar_cmd_pos"
  gz_topic_name: "/lidar_cmd_pos"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ

# Gazebo lidar → lidar3d node
- ros_topic_name: "/scan"
  gz_topic_name: "/scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

# Gazebo IMU → ROS
- ros_topic_name: "/imu"
  gz_topic_name: "/imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS

# Gazebo MecanumDrive odometry → ROS
- ros_topic_name: "/wheel/odometry"
  gz_topic_name: "/wheel/odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

# NOTE: Gazebo's MecanumDrive plugin also publishes a dynamic
# odom→base_footprint transform on /model/gregor/tf. We deliberately do
# NOT bridge it: the robot_localization EKF (config/sim/ekf.yaml) owns
# odom→base_footprint and would conflict with two publishers on /tf.
# robot_state_publisher handles every other (static) URDF transform.

# Gazebo joint states → ROS (covers all joints including tilt)
- ros_topic_name: "/joint_states"
  gz_topic_name: "/world/test_world/model/gregor/joint_state"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS
