### 3d_mapping.yaml ###
# Parameters for the 3dMapping.launch.py bringup.
#
# Set sim: true to launch with Gazebo instead of real hardware.
_launch_settings:
  ros__parameters:
    sim: true

ldlidar:
  ros__parameters:
    serial_port: /dev/ttyAMA0
    topic_name: /scan
    lidar_frame: laser
    lidar_type: LD06

lidar3d:
  ros__parameters:
    # Tilt sweep — narrowed to ±20° (was ±30°) so the servo can complete
    # one full sweep in 0.5 s without exceeding ~3 rad/s. The 40° range
    # still gives MOLA enough vertical structure to constrain
    # roll/pitch (with `imu_gravity_correction` doing the heavy lifting,
    # see mola_lo.launch.py), and the faster cycle halves the per-cloud
    # body motion that MOLA-LO's ConstantVelocity prediction has to
    # absorb between ICP steps. That was the dominant source of
    # "rotates in multiple axes / map twists during turns".
    min_angle_deg: -20.0
    max_angle_deg:  20.0
    # Sweep + publish window: 0.5 s. Each published cloud now spans
    # half the body motion of the previous 1.0 s setting, giving
    # MOLA's ICP a much better-conditioned problem during turns.
    # Publishing rate doubles to 2 Hz.
    #
    # If you ever push this lower than 0.4 s, double-check the servo
    # actually keeps up (real RC servos top out around 300–400°/s; we
    # ask for 40°/0.5 s = 80°/s here, comfortably below the limit).
    # If the map ever looks flat / under-constrained vertically, walk
    # the angle back up *before* lengthening the sweep.
    sweep_period_s: 0.5    # 40° of tilt per cloud, 80°/s servo speed
    # Publish a merged cloud every `publish_period_s`, containing the
    # *last `sweep_period_s`* of beams. Equal to sweep_period_s →
    # consecutive clouds are disjoint (no overlap, max throughput).
    publish_period_s: 0.5
    # Topics
    scan_topic: /scan
    cloud_topic: /lidar3d/points
    joint_state_topic: /lidar_joint_states
    cmd_topic: /lidar_cmd_pos
    # TF
    joint_name: Upper-Level_Revolute-3
    # UART angle feedback
    uart_port: /dev/ttyAMA1
    uart_baud: 921600
    angle_invert: true
    # Hardware PWM
    pwm_chip: 0
