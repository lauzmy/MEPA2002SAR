### 3d_mapping.yaml ###
# Parameters for the 3dMapping.launch.py bringup.
#
# Set sim: true to launch with Gazebo instead of real hardware.
_launch_settings:
  ros__parameters:
    sim: false

ldlidar:
  ros__parameters:
    serial_port: /dev/ttyAMA0
    topic_name: /scan
    lidar_frame: laser
    lidar_type: LD06

lidar3d:
  ros__parameters:
    # Tilt sweep — ±20° kept (40° vertical FOV is plenty given MOLA's
    # gravity-prior + EKF motion-prior fusion, see mola_lo.launch.py).
    min_angle_deg: 0.0
    max_angle_deg: 30.0
    # Sweep + publish window: 1.0 s (was 0.5 s).
    #
    # Why slower: each LD06 revolution physically spans ~100 ms. At a
    # 0.5 s sweep the servo travels 8° of tilt *within* one revolution,
    # and because the LD06 driver lies about `time_increment` (it
    # publishes 0, see lipkg.cpp::ToLaserscan), all beams in the ring
    # were stamped identically and got the same interpolated tilt
    # angle. The result was visible "ladder" streaks between walls
    # in the 3D map: each ring laid flat at one quantized tilt instead
    # of being unwound continuously. Doubling sweep_period_s to 1.0 s
    # halves the per-revolution tilt sweep to 4° (≈ ±2.5 cm vertical
    # smear at 1.5 m range vs. ±10 cm before), which is small enough
    # to be lost in LD06 range noise.
    #
    # We can afford the slower cadence now because:
    #   * `forward_ros_tf_odom_to_mola=True` (mola_lo.launch.py) feeds
    #     EKF /tf into MOLA's navstate between ICP steps, so longer
    #     gaps between clouds no longer freeze the published pose.
    #   * `imu_gravity_correction=True` + MOLA_IMU_GRAVITY_SIGMA_DEG=0.5
    #     constrain ICP roll/pitch tightly, so we don't need a fast
    #     sweep to inject vertical structure for stability.
    #
    # See also the per-beam timestamp fix in ros_gz_application/nodes/
    # lidar3d.py and the matching `time_increment` / `scan_time` /
    # header.stamp fix in src/sensors/ldlidar/src/lipkg.cpp.
    sweep_period_s: 0.5    # 40° of tilt per cloud, 40°/s servo speed
    # Publish a merged cloud every `publish_period_s`, containing the
    # *last `sweep_period_s`* of beams. Equal to sweep_period_s →
    # consecutive clouds are disjoint (no overlap, max throughput).
    publish_period_s: 0.5
    # Topics
    scan_topic: /scan
    cloud_topic: /lidar3d/points
    joint_state_topic: /lidar_joint_states
    cmd_topic: /lidar_cmd_pos
    # TF
    joint_name: Upper-Level_Revolute-3
    # UART angle feedback
    uart_port: /dev/ttyAMA1
    uart_baud: 921600
    angle_invert: true
    # Hardware PWM
    pwm_chip: 0
