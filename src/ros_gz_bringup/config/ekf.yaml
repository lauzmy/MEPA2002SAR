### ekf.yaml ###
ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    frequency: 30.0
    two_d_mode: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # Wheel Odometry (from Gazebo MecanumDrive)
    odom0: /test_robot/odometry
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false

    # IMU Data
    #imu0: /imu
    #imu0_config: [false, false, false,
    #              false, false, true,
    #              false, false, false,
    #              false, false, true,
    #              true,  true,  false]
    #imu0_differential: false
    #imu0_relative: true